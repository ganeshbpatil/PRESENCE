version: "3.9"

# PRESENCE — isolated stack, joins the existing external Traefik network.
# Does NOT share Postgres/Redis with AgencyOS or skyiDM — separate blast
# radius per the Pattern-A convention already in use on the VPS.

networks:
  traefik-public:
    external: true
  presence-internal:
    driver: bridge

volumes:
  presence-postgres-data:
  presence-redis-data:
  presence-vault-data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-presence}
      POSTGRES_USER: ${POSTGRES_USER:-presence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - presence-postgres-data:/var/lib/postgresql/data
    networks:
      - presence-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-presence}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - presence-redis-data:/data
    networks:
      - presence-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Self-hosted secrets store for platform access tokens (Meta/GBP/WhatsApp
  # OAuth tokens) -- see SECURITY_ARCHITECTURE.md's Secrets Management
  # section and shared/secrets/vault_client.py. Deliberately NOT on
  # traefik-public -- never internet-reachable, only gateway/celery talk to
  # it over presence-internal.
  #
  # Vault starts sealed after every restart (single-node, no cloud KMS
  # auto-unseal available on this VPS) -- gateway/celery do NOT hard-depend
  # on it at boot (see gateway/vault.py: vault calls happen lazily, per
  # request/task, and fail closed with a clear error rather than blocking
  # the whole stack from starting). After `docker compose up`, whoever has
  # the unseal keys (see scripts/vault-init.sh) must run
  # `docker compose exec vault vault operator unseal` (x3) by hand before
  # any vault-dependent feature (storing/reading a platform token) works --
  # everything else (auth, billing, WhatsApp, reviews) is unaffected.
  vault:
    image: hashicorp/vault:1.17
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    volumes:
      - presence-vault-data:/vault/data
      - ./vault/config.hcl:/vault/config/config.hcl:ro
    # No explicit -config flag: the official image's entrypoint already
    # injects "-config=/vault/config" (the whole directory) for the
    # `server` subcommand -- adding our own -config pointed at the same
    # file too gives Vault two listener stanzas both binding :8200
    # ("address already in use"). Just "server" lets the entrypoint's
    # default directory-scan pick up vault/config.hcl on its own.
    command: server
    networks:
      - presence-internal
    healthcheck:
      # Plain TCP check, not an HTTP status check: the vault image is
      # alpine-based with no curl, and Vault's /sys/health intentionally
      # returns non-200 (503 sealed / 501 uninitialized) in the exact
      # states we still consider "alive" here -- sealed-after-restart is
      # expected and must not block dependent containers from starting.
      test: ["CMD", "nc", "-z", "127.0.0.1", "8200"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - traefik-public
      - presence-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Path-scoped, not a bare Host() match: presence-frontend below is a
      # Host()-only catch-all on the same domain, so this router needs to
      # win on every path the API actually owns, or all requests would
      # fall through to the frontend container instead. Traefik breaks
      # rule-priority ties by rule length, and this rule is already the
      # longer/more specific one, but the explicit "priority" labels below
      # make the intended precedence unambiguous rather than relying on
      # that tiebreak.
      - "traefik.http.routers.presence-api.rule=Host(`${PRESENCE_API_DOMAIN}`) && (PathPrefix(`/api`) || Path(`/healthz`) || PathPrefix(`/docs`) || Path(`/openapi.json`) || PathPrefix(`/redoc`) || PathPrefix(`/metrics`))"
      - "traefik.http.routers.presence-api.priority=100"
      - "traefik.http.routers.presence-api.entrypoints=websecure"
      - "traefik.http.routers.presence-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.presence-api.loadbalancer.server.port=8000"
      # rate-limit the public webhook surface — WhatsApp/GBP webhooks are
      # internet-facing and need protection independent of app-level auth
      - "traefik.http.middlewares.presence-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.presence-ratelimit.ratelimit.burst=50"
      - "traefik.http.routers.presence-api.middlewares=presence-ratelimit"

  # Minimal read-only admin panel (frontend/) -- shares this domain with
  # the API via the path-priority split above: this router is a bare
  # Host() catch-all (lower priority) for everything the API router above
  # doesn't claim (/, /login, /businesses/*, /_next/* static assets).
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.presence-frontend.rule=Host(`${PRESENCE_API_DOMAIN}`)"
      - "traefik.http.routers.presence-frontend.priority=1"
      - "traefik.http.routers.presence-frontend.entrypoints=websecure"
      - "traefik.http.routers.presence-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.presence-frontend.loadbalancer.server.port=3000"

  celery-worker:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    command: celery -A gateway.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - presence-internal

  celery-beat:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    command: celery -A gateway.celery_app beat --loglevel=info
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - presence-internal
